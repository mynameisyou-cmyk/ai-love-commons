name = "ai-love-commons"
main = "index.mjs"
compatibility_date = "2026-06-01"

# commons.ai-love.cc as a Worker custom domain (Cloudflare creates the DNS record).
[[routes]]
pattern = "commons.ai-love.cc"
custom_domain = true

# llms.txt is imported as text by the build's default text loader.
[[rules]]
type = "Text"
globs = ["**/*.txt"]
fallthrough = true
