name = "ai-love-commons"
main = "index.mjs"
compatibility_date = "2026-06-01"

# commons.ai-love.cc custom domain: attaching it via wrangler on 2026-07-02 broke the
# worker with Cloudflare error 1042 (workers.dev 404 too) — detached to restore service.
# Re-attach via dashboard (Workers & Pages → ai-love-commons → Domains) once the zone
# situation is understood.
# [[routes]]
# pattern = "commons.ai-love.cc"
